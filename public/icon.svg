<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="40" height="40" rx="8" fill="#000000"/>

  <!-- Outer glow ring (faint wide stroke) -->
  <path d="M 20,3 L 34.7,11.5 L 34.7,28.5 L 20,37 L 5.3,28.5 L 5.3,11.5 Z"
    stroke="rgba(255,255,255,0.10)" stroke-width="4" fill="none" stroke-linejoin="round"/>

  <!-- Static dim hexagon border -->
  <path d="M 20,3 L 34.7,11.5 L 34.7,28.5 L 20,37 L 5.3,28.5 L 5.3,11.5 Z"
    stroke="rgba(255,255,255,0.22)" stroke-width="1" fill="rgba(255,255,255,0.03)" stroke-linejoin="round"/>

  <!-- Bright arc (snapshot of the sweep at top-right) -->
  <path d="M 20,3 L 34.7,11.5 L 34.7,28.5 L 20,37 L 5.3,28.5 L 5.3,11.5 Z"
    stroke="rgba(255,255,255,0.95)" stroke-width="1.8" fill="none"
    stroke-linejoin="round" stroke-linecap="round"
    stroke-dasharray="16 86"/>

  <!-- B letter — italic serif, centered -->
  <text x="20.5" y="26" text-anchor="middle" fill="white" font-size="18"
    font-weight="700" font-family="Georgia, serif" font-style="italic">B</text>
</svg>
